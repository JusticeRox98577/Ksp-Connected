name: Release v1.0.1-alpha

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build the Inno Setup installer (.exe) on Windows ─────────────────────────
  build-installer:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # Build shared library
      - name: Build shared
        run: dotnet build Shared/KspConnected.Shared.csproj -c Release -nologo -v q

      # Build client plugin using KSP stubs (no real KSP install needed on CI)
      - name: Build client plugin (stubs)
        run: dotnet build Client/KspConnected.Client.csproj -c Release -nologo -v q

      # Copy plugin DLLs into GameData so Inno Setup can find them
      - name: Copy plugin DLLs to GameData
        run: |
          New-Item -ItemType Directory -Force -Path GameData\KspConnected\Plugins | Out-Null
          Copy-Item Client\bin\Release\net472\KspConnected.Client.dll  GameData\KspConnected\Plugins\ -Force
          Copy-Item Client\bin\Release\net472\KspConnected.Shared.dll  GameData\KspConnected\Plugins\ -Force
        shell: powershell

      # Publish self-contained server for Windows
      - name: Publish server (win-x64, self-contained)
        run: |
          dotnet publish Server/KspConnected.Server.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:DebugType=none `
            -nologo -v q `
            -o dist/server-win
          Copy-Item server.json dist/server-win/ -Force
        shell: powershell

      # Install Inno Setup 6 via Chocolatey
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # Compile the installer
      - name: Compile installer with ISCC
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\KSP-Connected.iss
        shell: powershell

      - name: Rename installer artifact
        run: |
          Copy-Item "dist\installer\KSP-Connected-v1.0.1-alpha-Setup.exe" "KSP-Connected-v1.0.1-alpha-Setup.exe" -Force
        shell: powershell

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: KSP-Connected-v1.0.1-alpha-Setup.exe

  # ── Build self-contained server zips for all platforms ───────────────────────
  build-server:
    name: Server (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64, osx-x64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Publish server
        run: |
          dotnet publish Server/KspConnected.Server.csproj \
            -c Release -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:DebugType=none \
            -o dist/server-${{ matrix.rid }}
          cp server.json dist/server-${{ matrix.rid }}/

      - name: Zip server
        run: |
          cd dist
          zip -r KSP-Connected-Server-${{ matrix.rid }}.zip server-${{ matrix.rid }}/

      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.rid }}
          path: dist/KSP-Connected-Server-${{ matrix.rid }}.zip

  # ── Publish GitHub release with all artifacts ─────────────────────────────────
  release:
    name: Publish Release
    needs: [build-installer, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Organise files
        run: |
          mkdir -p dist
          cp artifacts/installer/KSP-Connected-v1.0.1-alpha-Setup.exe  dist/
          cp artifacts/server-linux-x64/*.zip                           dist/
          cp artifacts/server-win-x64/*.zip                             dist/
          cp artifacts/server-osx-x64/*.zip                             dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.1-alpha
          name: "KSP-Connected v1.0.1-alpha — Pre-release"
          prerelease: true
          target_commitish: main
          body: |
            ## KSP-Connected v1.0.1-alpha

            > ⚠️ Alpha pre-release — expect bugs. Please report issues!

            Cross-PC multiplayer mod for **Kerbal Space Program 1.12**.

            ---

            ### What's new in v1.0.1
            - **Relay mode** — play without port forwarding. Host creates a room and shares a 6-character code; friends join using the new Relay tab. Deploy the relay server free on Railway / Render / Fly.io (Dockerfile included).
            - **Improved KSP auto-detection** — installer now scans every drive letter (C: through Z:) and checks GOG, Epic Games, and custom paths like `D:\KSP\`, not just the default Steam location.
            - **Self-contained server** — the server `.exe` ships with its own .NET runtime; no separate .NET installation required to run the server.
            - **Fixed duplicate log message** — "KSP not found" no longer appears twice on startup.

            ---

            ### 🖥️ Windows — One-click installer (recommended)
            1. Download **`KSP-Connected-v1.0.1-alpha-Setup.exe`** below
            2. Run it — auto-detects KSP on any drive (Steam, GOG, Epic, custom folder)
            3. Click **Install**

            > No extra runtime needed — the server is fully self-contained.

            ---

            ### 🖧 Playing without port forwarding (new in v1.0.1)
            Deploy the relay server free on Railway/Render/Fly.io (uses the included Dockerfile),
            then use the **Relay** tab in the KSP-Connected window — share a 6-character room code with friends. No router config needed.

            ---

            ### 🖧 Hosting a direct server
            Download the server zip for your OS and run:
            ```
            KspConnected.Server.exe          # Windows
            ./KspConnected.Server            # Linux / macOS
            ```
            Forward **TCP port 7654** and share your public IP.

            ---

            ### What's included
            - Real-time vessel sync (Keplerian orbital elements)
            - Full ghost vessel spawning — other players' ships appear as real KSP objects with collision
            - Map view markers for remote players
            - In-flight HUD, in-game chat, NTP-style time sync
            - **Relay mode** — play without port forwarding via room codes
          files: |
            dist/KSP-Connected-v1.0.1-alpha-Setup.exe
            dist/KSP-Connected-Server-linux-x64.zip
            dist/KSP-Connected-Server-win-x64.zip
            dist/KSP-Connected-Server-osx-x64.zip
